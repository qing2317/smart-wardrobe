name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap and Expect
        run: |
          npm install -g @bubblewrap/cli
          sudo apt-get update -qq
          sudo apt-get install -y -qq expect

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore app.keystore -storepass android -alias app -keypass android \
            -keyalg RSA -keysize 2048 -validity 365 \
            -dname "CN=SmartWardrobe, OU=Dev, O=SmartWardrobe, L=Unknown, ST=Unknown, C=Unknown"
          ls -la app.keystore

      - name: Generate Android App
        run: |
          mkdir -p android-app
          cd android-app
          echo 'set timeout 180' > init.exp
          echo 'spawn npx --yes @bubblewrap/cli init \' >> init.exp
          echo '  --manifest https://qing2317.github.io/smart-wardrobe/manifest.json \' >> init.exp
          echo '  --jks ../app.keystore \' >> init.exp
          echo '  --key app \' >> init.exp
          echo '  --storePassword android \' >> init.exp
          echo '  --keyPassword android \' >> init.exp
          echo '  --appVersionName "1.0.0" \' >> init.exp
          echo '  --appVersionCode 1' >> init.exp
          echo 'expect "install the JDK"' >> init.exp
          echo 'send "n\r"' >> init.exp
          echo 'expect "Path to your existing JDK"' >> init.exp
          echo 'send "$::env(JAVA_HOME)\r"' >> init.exp
          echo 'expect eof' >> init.exp
          echo 'lassign [wait] pid spawnid os_error_flag value' >> init.exp
          echo 'exit $value' >> init.exp
          cat init.exp
          expect init.exp

      - name: Build APK
        run: |
          cd android-app
          npx --yes @bubblewrap/cli build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-wardrobe-apk
          path: android-app/app/build/outputs/apk/release/*.apk

