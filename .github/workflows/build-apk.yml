name: Build Android APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build APK with Capacitor
        env:
          ANDROID_HOME: /Users/runner/Library/Android/sdk
        run: |
          echo "Init web project..."
          echo '{"name":"SmartWardrobe","version":"1.0.0","private":true}' > package.json
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init SmartWardrobe com.smartwardrobe.app --webDir=. --yes
          npx cap add android
          # Sync web assets
          npx cap sync android
          # Build APK
          cd android
          ./gradlew assembleRelease
          echo "=== Looking for APK ==="
          find . -name "*.apk" 2>/dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: smart-wardrobe-apk
          path: |
            android/app/build/outputs/**/*.apk
