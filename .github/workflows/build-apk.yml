name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O gradle.zip
          unzip -q gradle.zip
          mkdir -p app/src/main/java/com/example/app app/src/main/res/values
          echo -e 'pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }' > settings.gradle
          echo -e 'dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }' >> settings.gradle
          echo -e 'rootProject.name = "MyApp"\ninclude(":app")\n' >> settings.gradle
          echo -e 'plugins { id("com.android.application") version "8.2.0" apply false }' > build.gradle
          echo -e 'android.useAndroidX=true\norg.gradle.jvmargs=-Xmx2g' > gradle.properties
          echo -e 'plugins { id("com.android.application") }\nandroid {\n    namespace "com.example.app"\n    compileSdk 34\n    defaultConfig {\n        applicationId "com.example.app"\n        minSdk 24\n        targetSdk 34\n        versionCode 1\n        versionName "1.0"\n    }\n}\ndependencies {\n    implementation "androidx.appcompat:appcompat:1.6.1"\n}' > app/build.gradle
          echo -e '<?xml version="1.0"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><uses-permission android:name="android.permission.INTERNET"/><application android:label="SmartWardrobe" android:theme="@style/Theme.AppCompat.Light.NoActionBar"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>' > app/src/main/AndroidManifest.xml
          echo -e 'package com.example.app;\n\nimport android.os.Bundle;\nimport android.webkit.WebView;\nimport androidx.appcompat.app.AppCompatActivity;\n\npublic class MainActivity extends AppCompatActivity {\n    WebView wv;\n    @Override\n    protected void onCreate(Bundle b) {\n        super.onCreate(b);\n        wv = new WebView(this);\n        wv.getSettings().setJavaScriptEnabled(true);\n        wv.getSettings().setDomStorageEnabled(true);\n        wv.loadUrl("https://qing2317.github.io/smart-wardrobe/");\n        setContentView(wv);\n    }\n    @Override\n    public void onBackPressed() {\n        if (wv.canGoBack()) wv.goBack();\n        else super.onBackPressed();\n    }\n}\n' > app/src/main/java/com/example/app/MainActivity.java
          ./gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          ./gradlew assembleRelease
          find . -name "*.apk" -type f
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/outputs/apk/**/*.apk