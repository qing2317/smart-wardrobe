name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      
      - name: Generate Android App
        run: |
          mkdir -p android-app
          cd android-app
          echo "y" | bubblewrap init \
            --manifest https://qing2317.github.io/smart-wardrobe/manifest.json \
            --appVersionName "1.0.0" \
            --appVersionCode 1
      
      - name: Build APK
        run: |
          cd android-app
          bubblewrap build
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-wardrobe-apk
          path: android-app/app/build/outputs/apk/release/*.apk
