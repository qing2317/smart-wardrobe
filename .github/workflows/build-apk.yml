name: Build Android APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build APK using pwabuilder
        run: |
          which java && java -version 2>&1
          yes | npx pwabuilder package https://qing2317.github.io/smart-wardrobe/ --android 2>&1 || true
          echo "=== Looking for APK ==="
          find / -name "*.apk" -type f 2>/dev/null | head -20
          echo "=== End of search ==="
      - uses: actions/upload-artifact@v4
        with:
          name: smart-wardrobe-apk
          path: |
            *.apk
            **/*.apk
