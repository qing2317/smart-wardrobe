name: Build Android APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build APK
        run: npx @pwabuilder/cli package https://qing2317.github.io/smart-wardrobe/ 2>&1 && find . -name '*.apk' -exec cp {} ./smart-wardrobe.apk \; || true
      - uses: actions/upload-artifact@v4
        with:
          name: smart-wardrobe-apk
          path: smart-wardrobe.apk