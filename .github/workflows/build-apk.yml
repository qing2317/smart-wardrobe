name: Build Android APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build APK with Capacitor
        env:
          ANDROID_HOME: /Users/runner/Library/Android/sdk
        run: |
          echo '{"name":"SmartWardrobe","version":"1.0.0","private":true}' > package.json
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init SmartWardrobe com.smartwardrobe.app --yes
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.smartwardrobe.app",
            "appName": "SmartWardrobe",
            "webDir": ".",
            "server": {
              "url": "https://qing2317.github.io/smart-wardrobe/"
            }
          }
          EOF
          npx cap add android
          npx cap sync android
          cd android
          export ANDROID_HOME=/Users/runner/Library/Android/sdk
          ./gradlew assembleRelease
          find . -name "*.apk" -type f
      - uses: actions/upload-artifact@v4
        with:
          name: smart-wardrobe-apk
          path: android/app/build/outputs/**/*.apk
