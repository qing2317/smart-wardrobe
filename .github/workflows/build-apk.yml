name: Build Android APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build APK
        run: |
          keytool -genkey -v -keystore app.keystore -alias pwa -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=PWA,OU=PWA,O=PWA,L=City,S=State,C=CN"
          npx @bubblewrap/cli init --manifest=https://qing2317.github.io/smart-wardrobe/manifest.json --directory=./android --signingKey=app.keystore --signingKeyAlias=pwa --signingKeyPassword=password
          npx @bubblewrap/cli build --directory=./android || true
          find ./android -name "*.apk" -exec cp {} ./smart-wardrobe.apk \; || true
          ls -la *.apk
      - uses: actions/upload-artifact@v4
        with:
          name: smart-wardrobe-apk
          path: smart-wardrobe.apk
